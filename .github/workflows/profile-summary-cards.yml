name: GitHub-Profile-Summary-Cards

on:
  schedule: # executa a cada 24 horas
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build: # Adicionado recuo de 2 espaços aqui
    runs-on: ubuntu-latest
    name: generate-github-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3 # Atualizado para v3 (mais estável)
      
      - name: Generate cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARD_TOKEN }} # Removidos os colchetes []
        with:
          USERNAME: ${{ github.repository_owner }}
